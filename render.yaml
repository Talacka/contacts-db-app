databases:
  - name: contacts-db
    databaseName: contacts_db
    user: postgres
    plan: free

services:
  - type: web
    name: contacts-api-service
    runtime: node
    buildCommand: npm install
    startCommand: npm run seed && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contacts-db
          property: connectionString
