<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts DB - Minimalist UI</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* Minimalist-specific layout adjustments */
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    .minimal-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .minimal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
    }
    .minimal-header h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .minimal-search {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .minimal-search input {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 1rem;
      color: white;
    }
    .minimal-search input:focus {
      border: none;
      box-shadow: none;
      background: transparent;
    }
    .minimal-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .minimal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--transition-normal);
    }
    .minimal-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(17, 24, 39, 0.85);
    }
    .card-trigger {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      gap: 16px;
      user-select: none;
    }
    .card-expand-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--transition-normal) ease-out;
      border-top: 0 solid var(--border-color);
      background: rgba(0, 0, 0, 0.15);
    }
    .minimal-card.expanded {
      border-color: var(--primary-glow);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .minimal-card.expanded .card-expand-content {
      max-height: 500px;
      border-top-width: 1px;
    }
    .card-chevron {
      color: var(--text-muted);
      transition: transform var(--transition-fast);
    }
    .minimal-card.expanded .card-chevron {
      transform: rotate(90deg);
      color: white;
    }
    
    /* Dialogs / Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-normal);
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-dialog {
      background: #0f172a;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      transform: translateY(20px);
      transition: transform var(--transition-normal);
    }
    .modal-overlay.active .modal-dialog {
      transform: translateY(0);
    }
    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
    }
    .btn-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      padding: 4px;
    }
    .btn-close:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div class="minimal-container">
    
    <!-- Header -->
    <header class="minimal-header">
      <h1>Contacts</h1>
      <div style="display: flex; gap: 8px;">
        <a href="dashboard.html" class="btn btn-secondary flex-center" style="padding: 8px 12px; font-size: 0.8rem;" title="Database Schema Visualizer">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
          Schema DB
        </a>
        <button id="btn-open-add-person" class="btn btn-primary flex-center" style="padding: 8px 12px; font-size: 0.8rem;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Add Name
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="minimal-search">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted)"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="input-search" placeholder="Search contacts..." style="border: none; padding: 0;">
    </div>

    <!-- Contact List (Collapsible items) -->
    <div id="contacts-list-root" class="minimal-list">
      <div class="loading-spinner">Fetching contacts database...</div>
    </div>

  </div>

  <!-- Modal: Add Person -->
  <div id="modal-person" class="modal-overlay">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>Create Contact Profile</h3>
        <button class="btn-close" onclick="closeModal('modal-person')">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="form-new-person" class="form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="input-firstname">First Name *</label>
            <input type="text" id="input-firstname" required>
          </div>
          <div class="form-group">
            <label for="input-lastname">Last Name *</label>
            <input type="text" id="input-lastname" required>
          </div>
        </div>
        <div class="form-group">
          <label for="input-company">Company</label>
          <input type="text" id="input-company" placeholder="e.g. Acme Corp">
        </div>
        <div class="form-group">
          <label>Theme Color</label>
          <div class="color-picker-grid">
            <label class="color-radio" style="--color: #3b82f6"><input type="radio" name="avatar-color" value="#3b82f6" checked><span class="color-dot"></span></label>
            <label class="color-radio" style="--color: #8b5cf6"><input type="radio" name="avatar-color" value="#8b5cf6"><span class="color-dot"></span></label>
            <label class="color-radio" style="--color: #ec4899"><input type="radio" name="avatar-color" value="#ec4899"><span class="color-dot"></span></label>
            <label class="color-radio" style="--color: #10b981"><input type="radio" name="avatar-color" value="#10b981"><span class="color-dot"></span></label>
            <label class="color-radio" style="--color: #f59e0b"><input type="radio" name="avatar-color" value="#f59e0b"><span class="color-dot"></span></label>
            <label class="color-radio" style="--color: #ef4444"><input type="radio" name="avatar-color" value="#ef4444"><span class="color-dot"></span></label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">Save Profile</button>
      </form>
    </div>
  </div>

  <!-- Modal: Add Contact Method -->
  <div id="modal-contact" class="modal-overlay">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>Link New Contact Details</h3>
        <button class="btn-close" onclick="closeModal('modal-contact')">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="form-new-contact" class="form">
        <input type="hidden" id="input-link-person-id">
        <div class="form-group-row">
          <div class="form-group">
            <label for="select-contact-type">Channel Type</label>
            <select id="select-contact-type">
              <option value="Phone">Phone</option>
              <option value="Email">Email</option>
              <option value="Social">Social</option>
              <option value="Address">Address</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-contact-label">Label</label>
            <input type="text" id="input-contact-label" placeholder="Mobile, Work, Home..." required>
          </div>
        </div>
        <div class="form-group">
          <label for="input-contact-value">Value (Details)</label>
          <input type="text" id="input-contact-value" placeholder="e.g. +1 (555) 012-3456" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">Link Details</button>
      </form>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="toast hidden">Action completed</div>

  <script src="app.js"></script>
</body>
</html>
